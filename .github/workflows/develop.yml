name: Develop Branch CI

on:
    push:
        branches: [develop]
    pull_request:
        branches: [develop]

jobs:
    backend-tests:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./backend

        steps:
            - uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v3
              with:
                  python-version: "3.10"

            - name: Install backend dependencies
              run: |
                  pip install -r requirements.txt

            - name: Run migrations
              run: |
                  python manage.py makemigrations --check
                  python manage.py migrate

            - name: Run backend tests
              run: |
                  python manage.py test

            - name: Check code quality
              run: |
                  pip install flake8
                  flake8 . --count --max-complexity=10 --statistics

    frontend-checks:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./frontend

        steps:
            - uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "18"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              run: npm ci

            - name: Run frontend tests
              run: npm test -- --run

            - name: Build frontend
              run: npm run build

    integration-check:
        runs-on: ubuntu-latest
        needs: [backend-tests, frontend-checks]

        steps:
            - uses: actions/checkout@v3

            - name: Verify project structure
              run: |
                  echo "✅ Project structure verification:"
                  echo "Backend exists: $(test -d backend && echo 'Yes' || echo 'No')"
                  echo "Frontend exists: $(test -d frontend && echo 'Yes' || echo 'No')"
                  echo "Requirements exists: $(test -f backend/requirements.txt && echo 'Yes' || echo 'No')"
                  echo "Package.json exists: $(test -f frontend/package.json && echo 'Yes' || echo 'No')"
